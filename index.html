<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning To-Do List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-md-8 col-lg-6">

        <div class="todo-card"
          <h1>Morning To-Do List</h1>
          <p class="subtitle">Get your day started the right way.</p>

          <p id="taskCount">0/0 done</p>

          <div class="input-group mb-3">
            <input type="text" id="taskInput" class="form-control" placeholder="Add a morning task...">
            <button class="btn btn-warning" onclick="addTask()">Add Task</button>
          </div>

          <button class="btn btn-outline-danger w-100 mb-3" onclick="resetTasks()">Reset Tasks</button>

          <ul id="taskList" class="list-group"></ul>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
